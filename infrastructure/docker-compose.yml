version: '3.8'

services:
  rag_api:
    build: 
      context: ..
      dockerfile: infrastructure/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - QDRANT_HOST=qdrant_db
    depends_on:
      - qdrant_db

  qdrant_db:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  qdrant_data:
